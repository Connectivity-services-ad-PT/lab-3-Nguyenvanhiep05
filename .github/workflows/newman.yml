name: Contract and Newman Tests — Access Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contracts
        run: npx @stoplight/spectral-cli lint contracts/access-gate.openapi.yaml

      - name: Start Prism mock server (Access Gate)
        run: nohup npm run mock:gate > prism-gate.log 2>&1 &

      - name: Start Prism mock server (Core Business)
        run: nohup npm run mock:core > prism-core.log 2>&1 &

      - name: Wait for mock servers
        run: |
          sleep 5
          npx wait-on tcp:4010 tcp:4011 --timeout 60000

      - name: Run Newman on mock environment
        run: npm run test:mock

      - name: Generate HTML report
        if: always()
        run: npm run test:html || true

      - name: Show Prism logs on failure
        if: failure()
        run: |
          echo "=== Access Gate mock log ==="
          cat prism-gate.log || true
          echo "=== Core Business mock log ==="
          cat prism-core.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
