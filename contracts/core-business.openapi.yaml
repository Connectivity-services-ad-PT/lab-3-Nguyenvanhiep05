openapi: 3.1.0
info:
  title: Smart Campus — Core Business API (Mock for Access Gate)
  version: 1.0.0
  description: |
    Mock contract tối thiểu của Core Business dùng cho consumer-side smoke test của Access Gate.
    Chỉ chứa endpoint evaluate-access mà Access Gate cần gọi.
servers:
  - url: http://localhost:4011
    description: Mock server cho Core Business
tags:
  - name: policies
    description: Policy evaluation
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [policies]
      operationId: getHealth
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              examples:
                ok:
                  value:
                    status: ok
                    service: core-business

  /policies/evaluate-access:
    post:
      tags: [policies]
      operationId: evaluateAccess
      summary: Kiểm tra quyền truy cập của thẻ tại cổng/khu vực
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [card_id, gate_id, direction]
              properties:
                card_id:
                  type: string
                gate_id:
                  type: string
                direction:
                  type: string
                  enum: [in, out]
                zone_id:
                  type: string
            examples:
              check_access:
                value:
                  card_id: CARD-2026-001
                  gate_id: GATE-01
                  direction: in
                  zone_id: ZONE-A
      responses:
        "200":
          description: Kết quả đánh giá quyền truy cập
          content:
            application/json:
              schema:
                type: object
                required: [allowed, reason]
                properties:
                  allowed:
                    type: boolean
                  reason:
                    type: string
              examples:
                allowed:
                  value:
                    allowed: true
                    reason: Card is valid and has access permission
                denied:
                  value:
                    allowed: false
                    reason: Card expired
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                  detail:
                    type: string
              examples:
                invalid:
                  value:
                    type: https://smart-campus.local/problems/validation-error
                    title: Validation error
                    status: 400
                    detail: card_id is required

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
